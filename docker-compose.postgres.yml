version: '3.8'

services:
  hypergoat:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://hypergoat:hypergoat@postgres:5432/hypergoat?sslmode=disable
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-development-secret-key-change-in-production-64chars}
      - EXTERNAL_BASE_URL=${EXTERNAL_BASE_URL:-http://localhost:8080}
      - OAUTH_LOOPBACK_MODE=${OAUTH_LOOPBACK_MODE:-true}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hypergoat
      - POSTGRES_PASSWORD=hypergoat
      - POSTGRES_DB=hypergoat
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypergoat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
